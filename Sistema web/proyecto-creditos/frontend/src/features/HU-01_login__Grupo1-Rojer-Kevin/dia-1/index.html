<!DOCTYPE html>
<html lang="es">
<head>
  <link rel="stylesheet" href="./styles.css" />
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BDP PyMEs | Acceso Seguro</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <!--
    Overlay de fondos:
    Se usan varias capas para permitir una transición suave entre imágenes.
  -->
  <div class="background-slider">
    <div class="bg-slide active" style="background-image: url('https://images.unsplash.com/photo-1516483638261-f4dbaf036963?auto=format&fit=crop&w=1600&q=80');"></div>
    <div class="bg-slide" style="background-image: url('https://images.unsplash.com/photo-1520607162513-77705c0f0d4a?auto=format&fit=crop&w=1600&q=80');"></div>
    <div class="bg-slide" style="background-image: url('https://images.unsplash.com/photo-1506744038136-46273834b3fb?auto=format&fit=crop&w=1600&q=80');"></div>
  </div>

  <div class="page-overlay"></div>

  <main class="login-layout">
    <section class="login-card">
      <div class="brand-block">
        <span class="brand-badge">BDP · PyMEs</span>
        <h1>Bienvenido</h1>
        <p>Accede de forma segura a la plataforma financiera empresarial.</p>
      </div>

      <form class="login-form" autocomplete="off">
        <div class="form-group">
          <label for="email">Correo electrónico</label>
          <input type="email" id="email" name="email" placeholder="correo@bdp.com" />
        </div>

        <div class="form-group">
          <label for="password">Contraseña</label>
          <input type="password" id="password" name="password" placeholder="••••••••" />
        </div>

        <button type="button" class="btn-primary">Iniciar sesión</button>
      </form>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
